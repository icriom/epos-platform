
services:
  postgres:
    image: postgres:16
    container_name: epos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: epos_user
      POSTGRES_PASSWORD: epos_dev_password
      POSTGRES_DB: epos_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: epos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
